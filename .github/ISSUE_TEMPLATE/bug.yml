name: Bug
description: Track a bug with reproduction, impact, and governance metadata.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: symptom
    attributes:
      label: Symptom
      description: Describe the failure mode.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide steps or linked evidence.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who is affected and what is the risk?
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Reference blocking issues or follow-up work.
