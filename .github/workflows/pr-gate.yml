name: pr-gate

on:
  pull_request:
    branches:
      - main
  pull_request_review:
    types:
      - submitted
  issue_comment:
    types:
      - created

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-gate:
    if: ${{ github.event_name != 'issue_comment' || github.event.issue.pull_request }}
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.event.pull_request.head.sha }}

      - name: Validate memory system
        shell: pwsh
        run: ./tests/smoke/test-memory-files.ps1

      - name: Validate ops policies
        shell: pwsh
        run: ./tests/smoke/test-ops-config.ps1

      - name: Validate PR workflows
        shell: pwsh
        run: ./tests/smoke/test-github-templates.ps1

      - name: Pre PR gate
        shell: pwsh
        run: ./scripts/pre-pr-check.ps1
