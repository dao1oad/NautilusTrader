name: governance-check

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

permissions:
  contents: read

jobs:
  governance-check:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate governance files
        shell: pwsh
        run: ./scripts/check-governance.ps1 -SkipRemoteChecks

      - name: Validate template layout
        shell: pwsh
        run: ./tests/smoke/test-template-layout.ps1

      - name: Validate governance contract
        shell: pwsh
        run: ./tests/smoke/test-governance-files.ps1
